version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: argenprecios_db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - ./mongo-init:/docker-entrypoint-initdb.d
    environment:
      MONGO_INITDB_DATABASE: argenprecios
    restart: unless-stopped
    command: >
      mongod
      --wiredTigerCacheSizeGB 0.5
      --quiet

  api:
    build: .
    container_name: argenprecios_api
    depends_on:
      - mongodb
    ports:
      - "8000:8000"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/argenprecios
      - API_HOST=0.0.0.0
      - API_PORT=8000
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped

volumes:
  mongo_data:
    driver: local
